name: CI

# Runs on every push to dev (your working branch).
# Also runs when you open a pull request targeting main,
# so you get a final green check before merging.
on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
        run: npm run build
